services:
  db:
    image: postgres:16-alpine
    container_name: canteen_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: canteen_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - canteen_tracker_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d canteen_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  canteen_tracker_data:
