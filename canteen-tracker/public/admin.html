<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canteen Admin Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h1 class="title">Admin Dashboard</h1>
        <div class="meta" style="display: flex; gap: 8px; align-items: center;">
          <label for="qrDepartment">QR Department:</label>
          <select id="qrDepartment" style="min-width: 180px;"></select>
          <button id="downloadDeptQrBtn" class="secondary">
            Download Department QRs
          </button>
          <a href="/scanner.html">Open Scanner</a>
        </div>
      </div>

      <section class="card">
        <h2>Add Employee</h2>
        <form id="addEmployeeForm" class="row">
          <div>
            <label for="emp_code">Emp Code</label>
            <input id="emp_code" name="emp_code" required placeholder="EMP-006" />
          </div>
          <div>
            <label for="full_name">Full Name</label>
            <input id="full_name" name="full_name" required placeholder="John Doe" />
          </div>
          <div>
            <label for="department">Department</label>
            <input id="department" name="department" placeholder="Operations" />
          </div>
          <button type="submit">Add</button>
        </form>
        <div id="formError" class="error"></div>
      </section>

      <section class="card">
        <div class="topbar">
          <h2 style="margin: 0;">Employees</h2>
          <div style="display: flex; gap: 8px; align-items: center;">
            <label for="sortBy">Sort by:</label>
            <select id="sortBy">
              <option value="emp_code">Emp Code</option>
              <option value="full_name">Full Name</option>
              <option value="department">Department</option>
              <option value="status">Status</option>
              <option value="is_active">Active</option>
            </select>
            <select id="sortDir">
              <option value="asc">Ascending</option>
              <option value="desc">Descending</option>
            </select>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Emp Code</th>
              <th>Full Name</th>
              <th>Department</th>
              <th>Status</th>
              <th>Active</th>
              <th>QR</th>
            </tr>
          </thead>
          <tbody id="employeeBody"></tbody>
        </table>
      </section>

      <section class="card">
        <div class="topbar">
          <h2 style="margin: 0;">Meal Logs</h2>
          <div style="display: flex; gap: 8px; align-items: center;">
            <label for="logDate">Date:</label>
            <input type="date" id="logDate" />
            <button id="loadLogsBtn" class="secondary">Load</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Date</th>
              <th>Emp Code</th>
              <th>Name</th>
              <th>Department</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </section>
    </div>

    <script>
      const addEmployeeForm = document.getElementById("addEmployeeForm");
      const employeeBody = document.getElementById("employeeBody");
      const logBody = document.getElementById("logBody");
      const logDateInput = document.getElementById("logDate");
      const loadLogsBtn = document.getElementById("loadLogsBtn");
      const formError = document.getElementById("formError");
      const downloadDeptQrBtn = document.getElementById("downloadDeptQrBtn");
      const qrDepartmentSelect = document.getElementById("qrDepartment");
      const sortBySelect = document.getElementById("sortBy");
      const sortDirSelect = document.getElementById("sortDir");

      let employeesCache = [];
      const LOGS_POLL_INTERVAL_MS = 5000;

      function todayISO() {
        return new Date().toISOString().slice(0, 10);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      async function fetchEmployees() {
        const res = await fetch("/api/employees");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load employees");
        return data;
      }

      async function fetchLogs(date) {
        const res = await fetch(`/api/logs?date=${encodeURIComponent(date)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load logs");
        return data;
      }

      async function fetchDepartments() {
        const res = await fetch("/api/departments");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load departments");
        return data;
      }

      function compareValues(a, b, key) {
        if (key === "is_active") {
          return Number(a.is_active) - Number(b.is_active);
        }
        const left = String(a[key] ?? "").toLowerCase();
        const right = String(b[key] ?? "").toLowerCase();
        return left.localeCompare(right);
      }

      function getSortedEmployees(employees) {
        const key = sortBySelect.value;
        const dir = sortDirSelect.value === "desc" ? -1 : 1;
        return [...employees].sort((a, b) => compareValues(a, b, key) * dir);
      }

      function renderDepartments(departments) {
        const previousValue = qrDepartmentSelect.value;
        qrDepartmentSelect.innerHTML = departments
          .map(
            (department) =>
              `<option value="${escapeHtml(department)}">${escapeHtml(department)}</option>`
          )
          .join("");

        if (!departments.length) {
          qrDepartmentSelect.innerHTML = '<option value="">No departments</option>';
          qrDepartmentSelect.disabled = true;
          downloadDeptQrBtn.disabled = true;
          return;
        }

        qrDepartmentSelect.disabled = false;
        downloadDeptQrBtn.disabled = false;
        if (departments.includes(previousValue)) {
          qrDepartmentSelect.value = previousValue;
        }
      }

      function renderEmployees(employees) {
        const sortedEmployees = getSortedEmployees(employees);
        employeeBody.innerHTML = sortedEmployees
          .map((emp) => {
            const statusClass = emp.status === "ELIGIBLE"
              ? "eligible"
              : emp.status === "USED"
              ? "used"
              : "inactive";

            return `
              <tr>
                <td>${escapeHtml(emp.emp_code)}</td>
                <td>${escapeHtml(emp.full_name)}</td>
                <td>${escapeHtml(emp.department || "")}</td>
                <td>
                  <div style="display:flex; gap:6px; align-items:center; white-space: nowrap;">
                    <span class="badge ${statusClass}">${escapeHtml(emp.status)}</span>
                    <button
                      class="secondary"
                      data-toggle-status="${emp.id}"
                      data-next-status="${emp.status === "USED" ? "ELIGIBLE" : "USED"}"
                      ${!emp.is_active ? "disabled" : ""}
                      style="padding: 4px 8px; font-size: 12px;"
                    >
                      Edit
                    </button>
                  </div>
                </td>
                <td>
                  <label>
                    <input
                      type="checkbox"
                      ${emp.is_active ? "checked" : ""}
                      data-active-toggle="${emp.id}"
                    />
                    ${emp.is_active ? "Active" : "Inactive"}
                  </label>
                </td>
                <td>
                  <button class="secondary" data-download-qr="${emp.id}">
                    Download QR
                  </button>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      function renderLogs(logs) {
        logBody.innerHTML = logs
          .map((log) => {
            const time = log.scanned_at
              ? new Date(log.scanned_at).toLocaleTimeString()
              : "-";
            return `
              <tr>
                <td>${escapeHtml(time)}</td>
                <td>${escapeHtml(log.meal_date)}</td>
                <td>${escapeHtml(log.emp_code || "-")}</td>
                <td>${escapeHtml(log.full_name || "Unknown")}</td>
                <td>${escapeHtml(log.department || "")}</td>
                <td>${escapeHtml(log.status)}</td>
              </tr>
            `;
          })
          .join("");
      }

      async function reloadAll() {
        const [employees, logs, departments] = await Promise.all([
          fetchEmployees(),
          fetchLogs(logDateInput.value || todayISO()),
          fetchDepartments()
        ]);
        employeesCache = employees;
        renderEmployees(employeesCache);
        renderLogs(logs);
        renderDepartments(departments);
      }

      addEmployeeForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        formError.textContent = "";

        const payload = {
          emp_code: document.getElementById("emp_code").value.trim(),
          full_name: document.getElementById("full_name").value.trim(),
          department: document.getElementById("department").value.trim()
        };

        try {
          const res = await fetch("/api/employees", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Failed to add employee");

          addEmployeeForm.reset();
          await reloadAll();
        } catch (error) {
          formError.textContent = error.message;
        }
      });

      employeeBody.addEventListener("change", async (event) => {
        const target = event.target;
        if (!(target instanceof HTMLInputElement)) return;
        const id = target.getAttribute("data-active-toggle");
        if (!id) return;

        try {
          const res = await fetch(`/api/employees/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ is_active: target.checked })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Failed to update employee");
          await reloadAll();
        } catch (error) {
          alert(error.message);
          await reloadAll();
        }
      });

      employeeBody.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLButtonElement)) return;

        const statusEmployeeId = target.getAttribute("data-toggle-status");
        if (statusEmployeeId) {
          const nextStatus = target.getAttribute("data-next-status");
          if (!nextStatus) return;
          const password = window.prompt("Enter admin password to edit status:");
          if (password === null) return;
          if (password !== "123") {
            alert("Incorrect password");
            return;
          }

          void (async () => {
            try {
              const res = await fetch(`/api/employees/${statusEmployeeId}/status`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status: nextStatus })
              });
              const data = await res.json();
              if (!res.ok) {
                throw new Error(data.error || "Failed to set status");
              }
              await reloadAll();
            } catch (error) {
              alert(error.message);
            }
          })();
          return;
        }

        const id = target.getAttribute("data-download-qr");
        if (!id) return;
        window.open(`/api/employees/${id}/qr`, "_blank");
      });

      loadLogsBtn.addEventListener("click", async () => {
        try {
          const logs = await fetchLogs(logDateInput.value || todayISO());
          renderLogs(logs);
        } catch (error) {
          alert(error.message);
        }
      });

      sortBySelect.addEventListener("change", () => {
        renderEmployees(employeesCache);
      });

      sortDirSelect.addEventListener("change", () => {
        renderEmployees(employeesCache);
      });

      downloadDeptQrBtn.addEventListener("click", () => {
        const department = qrDepartmentSelect.value;
        if (!department) {
          alert("Please select a department first");
          return;
        }
        window.open(
          `/api/employees/qr/bulk?department=${encodeURIComponent(department)}`,
          "_blank"
        );
      });

      async function refreshLiveData() {
        const [employees, logs, departments] = await Promise.all([
          fetchEmployees(),
          fetchLogs(logDateInput.value || todayISO()),
          fetchDepartments()
        ]);
        employeesCache = employees;
        renderEmployees(employeesCache);
        renderLogs(logs);
        renderDepartments(departments);
      }

      async function init() {
        logDateInput.value = todayISO();
        try {
          await reloadAll();
        } catch (error) {
          formError.textContent = error.message;
        }

        // Auto-refresh logs so admins see new scans live.
        setInterval(async () => {
          try {
            await refreshLiveData();
          } catch (_error) {
            // Ignore transient polling failures and keep UI usable.
          }
        }, LOGS_POLL_INTERVAL_MS);
      }

      void init();
    </script>
  </body>
  </html>
